<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cópia Cara!</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #1a1a1a; color: white; margin: 0; padding: 15px; min-height: 100vh; overflow-x: hidden; }
        .stats { font-size: 1.4rem; margin-bottom: 10px; color: #00ff88; font-weight: bold; }
        .container { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; width: 100%; }
        canvas { border: 3px solid #444; background-color: #fff; cursor: crosshair; border-radius: 12px; touch-action: none; max-width: 45vw; height: auto; }
        @media (max-width: 600px) { canvas { max-width: 90vw; } }
        .canvas-box h3 { margin: 8px 0; color: #bbb; text-align: center; font-size: 1rem; }
        .controls { margin-top: 15px; display: flex; gap: 10px; width: 100%; justify-content: center; }
        button { padding: 12px; font-size: 1rem; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; transition: 0.2s; flex: 1; max-width: 140px; }
        .btn-clear { background-color: #444; color: white; }
        .btn-check { background-color: #2ed573; color: white; }
        .credit { margin-top: 15px; color: #666; font-size: 0.8rem; letter-spacing: 1px; text-transform: uppercase; font-weight: bold; }
        #feedback { margin-top: 10px; font-size: 1.1rem; font-weight: bold; height: 1.2em; text-align: center; }
        .progress-bar { width: 90%; max-width: 300px; height: 10px; background: #333; border-radius: 5px; margin-top: 10px; overflow: hidden; }
        #progress-fill { width: 0%; height: 100%; background: #00ff88; transition: 0.3s; }
    </style>
</head>
<body>

    <div class="stats">Nível: <span id="level-display">1</span> / 50</div>
    
    <div class="container">
        <div class="canvas-box">
            <h3>Molde</h3>
            <canvas id="targetCanvas" width="300" height="300"></canvas>
        </div>
        <div class="canvas-box">
            <h3>Seu Desenho</h3>
            <canvas id="userCanvas" width="300" height="300"></canvas>
        </div>
    </div>

    <div class="progress-bar"><div id="progress-fill"></div></div>
    <div id="feedback">Copie o contorno!</div>

    <div class="controls">
        <button class="btn-clear" onclick="clearUserCanvas()">Limpar</button>
        <button class="btn-check" onclick="checkDrawing()">Verificar</button>
    </div>

    <div class="credit">Desenvolvido por elimartinhos</div>

    <script>
        const tCanvas = document.getElementById('targetCanvas');
        const uCanvas = document.getElementById('userCanvas');
        const tCtx = tCanvas.getContext('2d', { willReadFrequently: true });
        const uCtx = uCanvas.getContext('2d', { willReadFrequently: true });
        
        const blurCanvas = document.createElement('canvas');
        blurCanvas.width = blurCanvas.height = 300;
        const bCtx = blurCanvas.getContext('2d', { willReadFrequently: true });

        let drawing = false;
        let currentLevel = 1;

        const setupStyle = (ctx) => {
            ctx.lineWidth = 8;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = '#000';
        };

        setupStyle(tCtx);
        setupStyle(uCtx);

        const getPos = (e) => {
            const rect = uCanvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: (clientX - rect.left) * (uCanvas.width / rect.width),
                y: (clientY - rect.top) * (uCanvas.height / rect.height)
            };
        };

        const startDrawing = (e) => { drawing = true; draw(e); };
        const stopDrawing = () => { drawing = false; uCtx.beginPath(); };

        function draw(e) {
            if (!drawing) return;
            e.preventDefault();
            const pos = getPos(e);
            uCtx.lineTo(pos.x, pos.y);
            uCtx.stroke();
            uCtx.beginPath();
            uCtx.moveTo(pos.x, pos.y);
        }

        uCanvas.addEventListener('mousedown', startDrawing);
        uCanvas.addEventListener('touchstart', startDrawing);
        window.addEventListener('mouseup', stopDrawing);
        window.addEventListener('touchend', stopDrawing);
        uCanvas.addEventListener('mousemove', draw);
        uCanvas.addEventListener('touchmove', draw);

        function clearUserCanvas() {
            uCtx.clearRect(0, 0, 300, 300);
            document.getElementById('progress-fill').style.width = "0%";
            document.getElementById('feedback').innerText = "Desenhe novamente!";
        }

        function checkDrawing() {
            bCtx.clearRect(0, 0, 300, 300);
            bCtx.filter = 'blur(6px)'; 
            bCtx.drawImage(tCanvas, 0, 0);
            
            const tData = bCtx.getImageData(0, 0, 300, 300).data;
            const uData = uCtx.getImageData(0, 0, 300, 300).data;
            const rawTData = tCtx.getImageData(0, 0, 300, 300).data;
            
            let hits = 0, totalTargetArea = 0, userTotalInk = 0, targetTotalInk = 0;

            for (let i = 3; i < tData.length; i += 4) {
                const blurTarget = tData[i];
                const rawTarget = rawTData[i];
                const userInk = uData[i];

                if (rawTarget > 50) targetTotalInk++;
                if (userInk > 50) userTotalInk++;

                if (blurTarget > 20) {
                    totalTargetArea++;
                    if (userInk > 50) hits++;
                }
            }

            // LÓGICA ANTI-BORRÃO: 
            // 1. Precisão: O quanto você acertou a "aura" do desenho.
            let accuracy = (hits / totalTargetArea) * 100;

            // 2. Proporção de Tinta: Se você usou muito mais tinta que o molde, é um borrão.
            let inkRatio = userTotalInk / targetTotalInk;
            let inkPenalty = 1;
            if (inkRatio > 1.4) {
                // Penaliza se tiver mais de 40% de excesso de tinta
                inkPenalty = Math.max(0, 1 - (inkRatio - 1.4));
            } else if (inkRatio < 0.5) {
                // Penaliza se desenhou muito pouco
                inkPenalty = inkRatio;
            }

            let finalScore = Math.floor(accuracy * inkPenalty);
            
            // Bônus de conforto (pequeno ajuste para compensar mouse)
            if (finalScore > 10 && finalScore < 90) finalScore += 5;
            finalScore = Math.min(100, Math.max(0, finalScore));

            document.getElementById('progress-fill').style.width = finalScore + "%";
            const f = document.getElementById('feedback');

            if (finalScore >= 70) {
                f.innerHTML = `<span style="color:#00ff88">${finalScore}% - Passou!</span>`;
                setTimeout(nextLevel, 1000);
            } else {
                let msg = finalScore < 30 && inkRatio > 2 ? "Borrão detectado!" : "Siga a linha!";
                f.innerHTML = `<span style="color:#ff4757">${finalScore}% - ${msg}</span>`;
            }
        }

        function nextLevel() {
            if (currentLevel < 50) {
                currentLevel++;
                document.getElementById('level-display').innerText = currentLevel;
                clearUserCanvas();
                drawShape(currentLevel);
            } else {
                document.getElementById('feedback').innerText = "VENCEDOR FINAL!";
            }
        }

        function drawShape(lvl) {
            tCtx.clearRect(0, 0, 300, 300);
            tCtx.beginPath();
            const c = 150;
            if (lvl === 1) tCtx.arc(c, c, 70, 0, Math.PI*2);
            else if (lvl === 2) tCtx.rect(80, 80, 140, 140);
            else if (lvl === 3) { tCtx.moveTo(c, 75); tCtx.lineTo(75, 225); tCtx.lineTo(225, 225); tCtx.closePath(); }
            else if (lvl === 4) {
                tCtx.moveTo(c, 110);
                tCtx.bezierCurveTo(c, 85, 85, 85, 85, 125);
                tCtx.bezierCurveTo(85, 185, c, 225, c, 255);
                tCtx.bezierCurveTo(c, 225, 215, 185, 215, 125);
                tCtx.bezierCurveTo(215, 85, c, 85, c, 110);
            } else {
                const s = 3 + (lvl % 8);
                const r = (lvl * 15) * Math.PI / 180;
                for(let i=0; i<=s; i++) {
                    const a = (i * 2 * Math.PI) / s + r;
                    const x = c + 85 * Math.cos(a);
                    const y = c + 85 * Math.sin(a);
                    if(i===0) tCtx.moveTo(x,y); else tCtx.lineTo(x,y);
                }
            }
            tCtx.stroke();
        }

        drawShape(1);
    </script>
</body>
</html>
